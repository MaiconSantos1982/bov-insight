[phases.setup]
nixPkgs = [
  "nodejs_22",
  "npm-10_x"
]
aptPkgs = [
  "libglib2.0-0",
  "libnss3",
  "libnspr4",
  "libatk1.0-0",
  "libatk-bridge2.0-0",
  "libcups2",
  "libdrm2",
  "libdbus-1-3",
  "libxkbcommon0",
  "libxcomposite1",
  "libxdamage1",
  "libxfixes3",
  "libxrandr2",
  "libgbm1",
  "libasound2",
  "libpangocairo-1.0-0",
  "libpango-1.0-0",
  "libcairo2",
  "libatspi2.0-0",
  "libx11-6",
  "libx11-xcb1",
  "libxcb1",
  "libxext6",
  "libxshmfence1",
  "libexpat1",
  "ca-certificates",
  "fonts-liberation"
]

[phases.install]
cmds = ["npm ci"]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "npm run start:prod"
